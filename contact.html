<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — Ironsides Capital Partners</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #f7f5f2;
      font-family: 'DM Sans', 'Helvetica Neue', sans-serif;
      font-weight: 300;
      color: #3a3632;
    }

    .page {
      position: fixed;
      inset: 0;
      padding: 32px 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .top-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .firm-name {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: #3a3632;
    }

    .firm-location {
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: #3a3632;
    }

    .middle { flex: 1; }

    .bottom {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .contact-lines {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .contact-line {
      font-size: 13px;
      font-weight: 300;
      line-height: 1.6;
      color: #3a3632;
    }

    .contact-line a {
      color: #3a3632;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: opacity 0.15s;
    }
    .contact-line a:hover { opacity: 0.5; }

    .footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .close-btn {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: #3a3632;
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor: pointer;
      transition: opacity 0.15s;
      background: none;
      border: none;
      font-family: inherit;
    }
    .close-btn:hover { opacity: 0.5; }

    .disclosure {
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: #9a9590;
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .disclosure:hover { opacity: 0.6; }
  </style>
</head>
<body>
  <div class="page">

    <div class="top-left">
      <div class="firm-name">Ironsides Capital Partners</div>
      <div class="firm-location">Alexandria, Virginia</div>
    </div>

    <div class="middle"></div>

    <div class="bottom">
      <div class="contact-lines">
        <div class="contact-line">Media and press inquiries: <a href="mailto:press@ironsidescapitalpartners.com">press@ironsidescapitalpartners.com</a></div>
        <div class="contact-line">General correspondence: <a href="mailto:info@ironsidescapitalpartners.com">info@ironsidescapitalpartners.com</a></div>
      </div>

      <div class="footer-row">
        <button class="close-btn" onclick="window.location.href='index.html'">Close</button>
        <span class="disclosure">Disclosure</span>
      </div>
    </div>

  </div>
</body>
</html>
