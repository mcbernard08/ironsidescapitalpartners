<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ironsides Capital Partners</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #f7f5f2;
      font-family: 'DM Sans', 'Helvetica Neue', sans-serif;
      font-weight: 300;
      color: #3a3632;
    }

    #c {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
      z-index: 1;
    }

    .ui {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    .nav {
      position: absolute;
      top: 30px; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 52px;
      pointer-events: all;
    }

    .nav-group {
      display: flex;
      gap: 52px;
      flex: 1;
    }
    .nav-group.right { justify-content: flex-end; }

    .nav a {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: #3a3632;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .nav a:hover { opacity: 0.45; }

    .wordmark {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: 26px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #3a3632;
      padding: 0 48px;
      flex-shrink: 0;
      text-align: center;
      line-height: 1.1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .wordmark-sub {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: 12px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #3a3632;
    }

    .tagline {
      position: absolute;
      bottom: 44px;
      left: 52px;
      max-width: 280px;
      font-size: 13px;
      font-weight: 300;
      line-height: 1.65;
      color: #3a3632;
      pointer-events: all;
    }

    .footer-right {
      position: absolute;
      bottom: 44px;
      right: 52px;
      display: flex;
      gap: 36px;
      pointer-events: all;
    }
    .footer-right a {
      font-size: 10.5px;
      font-weight: 300;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #6b6560;
      text-decoration: none;
    }
    .footer-right a:hover { color: #3a3632; }
  </style>
</head>
<body>

  <canvas id="c"></canvas>

  <div class="ui">
    <nav class="nav">
      <div class="nav-group left">
        <a href="principles.html">Principles</a>
      </div>
      <div class="wordmark">
        Ironsides
        <span class="wordmark-sub">Capital Partners</span>
      </div>
      <div class="nav-group right">
        <a href="contact.html">Contact</a>
      </div>
    </nav>

    <div class="tagline">
      Investing, Building, and Owning The Companies That Make America Safe
    </div>

    <div class="footer-right">
      <a href="#">LinkedIn</a>
      <a href="#">© 2025 Ironsides Capital Partners</a>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    let W, H, cx, cy;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      cx = W / 2;
      cy = H / 2;
    }
    resize();
    window.addEventListener('resize', resize);

    // ── BUILD POINT CLOUD ON SPHERE ──
    const TOTAL   = 445;
    const RADIUS  = Math.min(W, H) * 0.13; // responsive

    // Each point: [x, y, z] on unit sphere
    const pts = [];
    const golden = Math.PI * (3 - Math.sqrt(5));

    for (let i = 0; i < TOTAL; i++) {
      const t    = i / TOTAL;
      const inc  = Math.acos(1 - 2 * t);
      const az   = golden * i;
      const jit  = 1 + (Math.random() - 0.5) * 0.06;
      pts.push([
        Math.sin(inc) * Math.cos(az) * jit,
        Math.cos(inc) * jit,
        Math.sin(inc) * Math.sin(az) * jit,
        2.5 + Math.random() * 2   // base dot radius
      ]);
    }

    // Sparse inner points for depth
    for (let i = 0; i < 56; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi   = Math.acos(2 * Math.random() - 1);
      const r     = 0.35 + Math.random() * 0.55;
      pts.push([
        Math.sin(phi) * Math.cos(theta) * r,
        Math.cos(phi) * r,
        Math.sin(phi) * Math.sin(theta) * r,
        1 + Math.random() * 1.5
      ]);
    }

    // ── ROTATION STATE ──
    let rotY = 0;
    let rotX = 0;
    let floatY = 0;

    // 3D rotation helpers
    function rotateY(x, y, z, a) {
      const cos = Math.cos(a), sin = Math.sin(a);
      return [cos * x + sin * z, y, -sin * x + cos * z];
    }
    function rotateX(x, y, z, a) {
      const cos = Math.cos(a), sin = Math.sin(a);
      return [x, cos * y - sin * z, sin * y + cos * z];
    }

    let last = 0;
    function animate(ts) {
      requestAnimationFrame(animate);
      const dt = Math.min((ts - last) / 1000, 0.05);
      last = ts;

      rotY += 0.30 * dt;
      rotX += 0.10 * dt;
      floatY = Math.sin(ts * 0.0007) * 0.03;

      const R = Math.min(window.innerWidth, window.innerHeight) * 0.13;

      // Fill background
      ctx.fillStyle = '#f7f5f2';
      ctx.fillRect(0, 0, W, H);

      // Project and sort by depth
      const projected = pts.map(([px, py, pz, dotR]) => {
        let [x, y, z] = rotateY(px, py, pz, rotY);
        [x, y, z]     = rotateX(x, y, z, rotX);
        y += floatY;
        // Simple perspective
        const fov   = 6;
        const scale = fov / (fov + z);
        const sx    = cx + x * R * scale;
        const sy    = cy + y * R * scale;
        const depth = (z + 1.5) / 3; // 0..1, closer = higher
        return { sx, sy, scale, dotR, depth };
      });

      // Sort back-to-front so nearer dots paint over far ones
      projected.sort((a, b) => a.depth - b.depth);

      // Draw
      for (const { sx, sy, scale, dotR, depth } of projected) {
        // Depth-based opacity and color
        const alpha = 0.18 + depth * 0.72;
        const grey  = Math.round(58 - depth * 28); // darker in front
        ctx.beginPath();
        ctx.arc(sx, sy, dotR * scale * 1.1, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${grey}, ${grey - 2}, ${grey - 4}, ${alpha})`;
        ctx.fill();
      }
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
