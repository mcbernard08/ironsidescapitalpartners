<!DOCTYPE html>
<html>
<head>
    <title>Principles</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
    <h1>Our Principles</h1>
    <div class="principle">
        <h2>Principle 1</h2>
        <button class="expandable">Expand</button>
        <div class="expanded-content" style="display: none;">
            <p>Details about principle 1...</p>
            <button onclick="window.location.href='index.html';">Close</button>
        </div>
    </div>
    <div class="principle">
        <h2>Principle 2</h2>
        <button class="expandable">Expand</button>
        <div class="expanded-content" style="display: none;">
            <p>Details about principle 2...</p>
            <button onclick="window.location.href='index.html';">Close</button>
        </div>
    </div>
    <div class="principle">
        <h2>Principle 3</h2>
        <button class="expandable">Expand</button>
        <div class="expanded-content" style="display: none;">
            <p>Details about principle 3...</p>
            <button onclick="window.location.href='index.html';">Close</button>
        </div>
    </div>
    <script>
        document.querySelectorAll('.expandable').forEach(button => {
            button.addEventListener('click', () => {
                const content = button.nextElementSibling;
                if (content.style.display === 'none') {
                    content.style.display = 'block';
                    button.textContent = 'Collapse';
                } else {
                    content.style.display = 'none';
                    button.textContent = 'Expand';
                }
            });
        });
    </script>
</body>
</html>
